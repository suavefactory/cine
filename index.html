<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cine Lisboa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg:        #f7f7f5;
      --surface:   #ffffff;
      --surface-2: #eeeeec;
      --accent:    #c8ff47;
      --accent-dim:#a8d936;
      --text:      #0a0a0a;
      --text-2:    #666;
      --text-3:    #bbb;
      --border:    #e2e2e0;
      --radius:    6px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ─────────────────────────────────────────── */

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(247,247,245,0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 58px;
    }

    .logo {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.5px;
      user-select: none;
    }
    .logo em { font-style: normal; color: var(--accent); }

    nav { display: flex; gap: 2px; }

    nav button {
      background: none;
      border: none;
      color: var(--text-2);
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      padding: 7px 16px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }
    nav button:hover  { color: var(--text); background: var(--surface-2); }
    nav button.active { color: var(--bg);   background: var(--accent); }

    /* ── DATE BAR ───────────────────────────────────────── */

    .date-bar {
      padding: 14px 40px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .date-bar::-webkit-scrollbar { display: none; }

    .date-chip {
      flex-shrink: 0;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-2);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 18px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
      min-width: 62px;
    }
    .date-chip:hover { border-color: var(--text-3); color: var(--text); }
    .date-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
      font-weight: 700;
    }
    .date-chip .dn  { display: block; font-size: 9px; text-transform: uppercase; letter-spacing: 0.7px; opacity: 0.6; margin-bottom: 2px; }
    .date-chip .dd  { display: block; font-size: 18px; font-weight: 700; line-height: 1; }
    .date-chip .dm  { display: block; font-size: 9px; opacity: 0.5; margin-top: 2px; }

    /* ── FILTER BAR ─────────────────────────────────────── */

    .filter-bar {
      padding: 10px 40px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-3);
      font-weight: 700;
      flex-shrink: 0;
      padding-right: 6px;
      border-right: 1px solid var(--border);
      margin-right: 2px;
    }

    .cinema-chip {
      flex-shrink: 0;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-2);
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: 0.2px;
    }
    .cinema-chip .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .cinema-chip:hover { color: var(--text); border-color: #444; }
    .cinema-chip.active { color: var(--text); background: rgba(255,255,255,0.04); }

    /* ── MAIN ───────────────────────────────────────────── */

    main {
      padding: 36px 40px 80px;
      max-width: 1440px;
      margin: 0 auto;
    }

    /* ── AGENDA VIEW ────────────────────────────────────── */

    .agenda-day { margin-bottom: 52px; scroll-margin-top: 120px; }

    .day-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 6px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .day-header .dname {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-3);
      font-weight: 700;
    }
    .day-header .ddate {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .day-header .ddate.today { color: var(--accent); }
    .day-header .dcount {
      font-size: 12px;
      color: var(--text-3);
      margin-left: auto;
    }

    .sessions-list { display: flex; flex-direction: column; }

    .session-row {
      display: grid;
      grid-template-columns: 58px 1fr auto;
      align-items: center;
      gap: 24px;
      padding: 13px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.12s;
      border-bottom: 1px solid transparent;
    }
    .session-row:hover { background: var(--surface); }

    .stime {
      font-size: 15px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .smovie { display: flex; flex-direction: column; gap: 3px; }
    .stitle { font-size: 15px; font-weight: 600; }
    .smeta  { font-size: 12px; color: var(--text-2); }

    .scinema {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-2);
      white-space: nowrap;
      letter-spacing: 0.1px;
    }
    .scinema .cdot { width: 8px; height: 8px; border-radius: 50%; }

    /* ── FILMES VIEW ────────────────────────────────────── */

    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 28px;
    }

    .movie-card { cursor: pointer; }

    .movie-poster {
      width: 100%;
      aspect-ratio: 2/3;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      margin-bottom: 14px;
    }

    .poster-bg {
      width: 100%;
      height: 100%;
      position: relative;
      transition: transform 0.35s ease;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 18px;
    }
    .movie-card:hover .poster-bg { transform: scale(1.04); }

    .poster-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.1) 55%, transparent 100%);
    }

    .poster-title {
      position: relative;
      z-index: 1;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.3;
    }

    .poster-dir {
      position: relative;
      z-index: 1;
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      margin-top: 3px;
    }

    .movie-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .genres { display: flex; gap: 4px; flex-wrap: wrap; }
    .genre-tag {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 3px;
      background: var(--surface-2);
      color: var(--text-3);
    }

    .session-pill {
      font-size: 11px;
      font-weight: 700;
      color: var(--bg);
      background: var(--text);
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }

    /* ── MODAL ──────────────────────────────────────────── */

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border-radius: 14px;
      width: 100%;
      max-width: 760px;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      transform: translateY(16px);
      transition: transform 0.2s ease;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-top {
      display: flex;
      gap: 28px;
      padding: 28px 28px 24px;
    }

    .modal-poster {
      flex-shrink: 0;
      width: 160px;
      aspect-ratio: 2/3;
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface-2);
    }
    .modal-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .modal-poster-fallback {
      width: 100%;
      height: 100%;
    }

    .modal-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .modal-title {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.2;
    }

    .modal-close {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--surface-2);
      cursor: pointer;
      font-size: 16px;
      color: var(--text-2);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .modal-close:hover { background: var(--border); }

    .modal-meta {
      font-size: 13px;
      color: var(--text-2);
    }

    .modal-genres { display: flex; gap: 4px; flex-wrap: wrap; }

    .modal-plot {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-2);
    }

    .modal-sessions {
      border-top: 1px solid var(--border);
      padding: 20px 28px 28px;
    }

    .modal-sessions-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-3);
      margin-bottom: 14px;
    }

    .modal-session-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .modal-session-row:last-child { border-bottom: none; }

    .modal-sdate {
      width: 110px;
      flex-shrink: 0;
      color: var(--text-2);
    }
    .modal-stime {
      font-weight: 700;
      width: 44px;
      flex-shrink: 0;
    }
    .modal-scinema {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-2);
    }
    .modal-scinema .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .modal-cal-btn {
      margin-left: auto;
      flex-shrink: 0;
      background: none;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 3px 9px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-2);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .modal-cal-btn:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }

    /* ── CINEMAS VIEW ───────────────────────────────────── */

    #cinema-map {
      width: 100%;
      height: 420px;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 52px;
      border: 1px solid var(--border);
    }

    .leaflet-popup-content-wrapper {
      border-radius: 10px !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15) !important;
      border: 1px solid #e2e2e0 !important;
      font-family: 'Space Grotesk', sans-serif !important;
    }
    .leaflet-popup-tip-container { display: none; }

    .cinema-section { margin-bottom: 52px; }

    .cinema-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .cinema-header .chball {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .cinema-header .chname {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .cinema-header .chzone {
      font-size: 12px;
      color: var(--text-3);
      margin-left: auto;
    }

    /* ── SORT BAR ───────────────────────────────────────── */

    .sort-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 28px;
    }
    .sort-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-3);
      font-weight: 700;
      margin-right: 4px;
    }
    .sort-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-2);
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .sort-btn:hover { color: var(--text); border-color: var(--text-3); }
    .sort-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }

    /* ── EMPTY ──────────────────────────────────────────── */
    .empty {
      padding: 100px 0;
      text-align: center;
      color: var(--text-3);
      font-size: 14px;
      letter-spacing: 0.2px;
    }
  </style>
</head>

// ── STATE ─────────────────────────────────────────────────────────────────────

// ── CARREGAR DADOS (reais ou mock) ────────────────────────────────────────────

// Se o scraper já correu, usa os dados reais; caso contrário usa os dados mock
const CINEMA_COLORS = Object.fromEntries(CINEMAS.map(c => [c.id, c.color]));
const CINEMA_GRADIENTS = {
  cinemateca: 'linear-gradient(135deg,#1a0808 0%,#2e1010 100%)',
  sao_jorge:  'linear-gradient(135deg,#0a0a18 0%,#181828 100%)',
  ideal:      'linear-gradient(135deg,#081418 0%,#102030 100%)',
  nimas:      'linear-gradient(135deg,#0e0818 0%,#1c1028 100%)',
  fernando:   'linear-gradient(135deg,#041410 0%,#082018 100%)',
  culturgest: 'linear-gradient(135deg,#081408 0%,#102010 100%)',
  nos_colombo:'linear-gradient(135deg,#080c18 0%,#101828 100%)',
  cc:         'linear-gradient(135deg,#100c04 0%,#201808 100%)',
};

const MOVIES = (window.CINEMA_DATA?.movies ?? MOCK_MOVIES).map(m => {
  const firstCinema = m.sessions?.[0]?.cinema;
  return {
    ...m,
    bg: m.bg ?? CINEMA_GRADIENTS[firstCinema] ?? 'linear-gradient(135deg,#111 0%,#1e1e1e 100%)',
    sessions: (m.sessions ?? []).map(s => ({ ...s, time: s.time.replace('*', '').trim() })),
  };
});

// Ajusta a data inicial ao dia actual
const TODAY = new Date().toISOString().split('T')[0];

let activeView   = 'agenda';
let activeDate   = TODAY;
let activeCinemas = new Set();
let filmesSort   = 'data'; // 'data' | 'rating'
let leafletMap   = null;

// ── HELPERS ───────────────────────────────────────────────────────────────────

const PT_DAYS   = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const PT_MONTHS = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

function getDates() {
  const start = new Date(TODAY + 'T00:00:00');
  return Array.from({length: 12}, (_, i) => {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    return {
      value:  d.toISOString().split('T')[0],
      name:   PT_DAYS[d.getDay()],
      num:    d.getDate(),
      month:  PT_MONTHS[d.getMonth()],
      today:  i === 0
    };
  });
}

function cinema(id) { return CINEMAS.find(c => c.id === id) || {}; }

function movieMeta(m) {
  const parts = [];
  if (m.director) parts.push(m.director);
  if (m.year)     parts.push(m.year);
  if (m.duration) parts.push(m.duration + 'min');
  if (m.country)  parts.push(m.country);
  if (m.rating)   parts.push('★ ' + m.rating.toFixed(1));
  return parts.join(' · ') || '—';
}

function cinemaOk(cid) {
  return activeCinemas.size === 0 || activeCinemas.has(cid);
}

function sessionCount(movie) {
  return movie.sessions.filter(s => cinemaOk(s.cinema)).length;
}

// ── RENDER DATE BAR ───────────────────────────────────────────────────────────

function renderDateBar() {
  document.getElementById('dateBar').innerHTML =
    getDates().map(d => `
      <button class="date-chip ${d.value === activeDate ? 'active' : ''}"
              onclick="setDate('${d.value}')">
        <span class="dn">${d.name}</span>
        <span class="dd">${d.num}</span>
        <span class="dm">${d.month}</span>
      </button>
    `).join('');
}

// ── RENDER FILTER BAR ─────────────────────────────────────────────────────────

function renderFilterBar() {
  // Só mostra cinemas que têm sessões nos dados actuais
  const activeCinemaIds = new Set(MOVIES.flatMap(m => m.sessions.map(s => s.cinema)));
  const visibleCinemas  = CINEMAS.filter(c => activeCinemaIds.has(c.id));

  document.getElementById('filterBar').innerHTML =
    `<span class="filter-label">Cinema</span>` +
    visibleCinemas.map(c => {
      const on = activeCinemas.has(c.id);
      return `
        <button class="cinema-chip ${on ? 'active' : ''}"
                style="${on ? `color:${c.color};border-color:${c.color}` : ''}"
                onclick="toggleCinema('${c.id}')">
          <span class="dot" style="background:${c.color}"></span>
          ${c.short}
        </button>`;
    }).join('');
}

// ── RENDER AGENDA ─────────────────────────────────────────────────────────────

function renderAgenda() {
  let html = '';

  for (const d of getDates()) {
    let sessions = [];
    for (const m of MOVIES) {
      for (const s of m.sessions) {
        if (s.date === d.value && cinemaOk(s.cinema))
          sessions.push({ ...s, movie: m });
      }
    }
    if (sessions.length === 0) continue;
    sessions.sort((a, b) => a.time.localeCompare(b.time));

    html += `
      <div class="agenda-day" data-date="${d.value}">
        <div class="day-header">
          <span class="dname">${d.name}</span>
          <span class="ddate ${d.today ? 'today' : ''}">${d.num} ${d.month}</span>
          <span class="dcount">${sessions.length} sessões</span>
        </div>
        <div class="sessions-list">
          ${sessions.map(s => {
            const c = cinema(s.cinema);
            return `
              <div class="session-row" onclick="openModal('${s.movie.id}')">
                <span class="stime">${s.time}</span>
                <div class="smovie">
                  <span class="stitle">${s.movie.title}</span>
                  <span class="smeta">${movieMeta(s.movie)}</span>
                </div>
                <div class="scinema">
                  <span class="cdot" style="background:${c.color}"></span>
                  ${c.short}
                </div>
              </div>`;
          }).join('')}
        </div>
      </div>`;
  }

  document.getElementById('main').innerHTML = html || '<div class="empty">Sem sessões disponíveis.</div>';
}

// ── RENDER FILMES ─────────────────────────────────────────────────────────────

function nextSession(movie) {
  // Data+hora da próxima sessão futura
  const now = TODAY;
  const future = movie.sessions
    .filter(s => cinemaOk(s.cinema) && s.date >= now)
    .sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));
  return future[0] ?? null;
}

function renderFilmes() {
  let movies = MOVIES.filter(m => sessionCount(m) > 0);

  if (filmesSort === 'rating') {
    movies = [...movies].sort((a, b) => (b.rating ?? 0) - (a.rating ?? 0));
  } else {
    // Ordena pela próxima sessão mais próxima
    movies = [...movies].sort((a, b) => {
      const sa = nextSession(a), sb = nextSession(b);
      if (!sa && !sb) return 0;
      if (!sa) return 1;
      if (!sb) return -1;
      return (sa.date + sa.time).localeCompare(sb.date + sb.time);
    });
  }

  document.getElementById('main').innerHTML = `
    <div class="sort-bar">
      <span class="sort-label">Ordenar</span>
      <button class="sort-btn ${filmesSort === 'data'   ? 'active' : ''}" onclick="setSort('data')">Próxima sessão</button>
      <button class="sort-btn ${filmesSort === 'rating' ? 'active' : ''}" onclick="setSort('rating')">Melhor rating ★</button>
    </div>
    <div class="movies-grid">
      ${movies.map(m => `
        <div class="movie-card" onclick="openModal('${m.id}')">
          <div class="movie-poster">
            <div class="poster-bg" style="${m.poster
              ? `background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 60%), url('${m.poster}') center/cover no-repeat`
              : `background:${m.bg}`}">
              ${m.poster ? '' : '<div class="poster-overlay"></div>'}
              <span class="poster-title">${m.title}</span>
              <span class="poster-dir">${m.director ?? ''}</span>
            </div>
          </div>
          <div class="movie-foot">
            <div class="genres">
              ${(m.genres ?? []).slice(0,2).map(g => `<span class="genre-tag">${g}</span>`).join('')}
              ${m.rating ? `<span class="genre-tag" style="background:var(--accent);color:var(--bg)">★ ${m.rating.toFixed(1)}</span>` : ''}
            </div>
            <span class="session-pill">Ver sessões</span>
          </div>
        </div>`).join('')}
    </div>`;
}

// ── RENDER CINEMAS ────────────────────────────────────────────────────────────

function initCinemaMap() {
  if (leafletMap) { leafletMap.remove(); leafletMap = null; }
  const el = document.getElementById('cinema-map');
  if (!el || typeof L === 'undefined') return;

  leafletMap = L.map('cinema-map', {
    center: [38.727, -9.148],
    zoom: 13,
    zoomControl: true,
    scrollWheelZoom: false,
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(leafletMap);

  // Count total sessions per cinema
  const sessionCounts = {};
  for (const m of MOVIES) {
    for (const s of m.sessions) {
      sessionCounts[s.cinema] = (sessionCounts[s.cinema] || 0) + 1;
    }
  }

  for (const c of CINEMAS) {
    if (!c.lat) continue;
    const count = sessionCounts[c.id] ?? 0;

    const icon = L.divIcon({
      className: '',
      html: `<div style="width:16px;height:16px;border-radius:50%;background:${c.color};border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.25);cursor:pointer"></div>`,
      iconSize: [16, 16],
      iconAnchor: [8, 8],
      popupAnchor: [0, -12],
    });

    const linkBtn = c.url
      ? `<a href="${c.url}" target="_blank" rel="noopener"
            style="display:inline-block;margin-top:8px;padding:5px 12px;border-radius:5px;background:${c.color};color:#fff;font-size:11px;font-weight:700;text-decoration:none;letter-spacing:0.3px">
           Abrir site ↗
         </a>`
      : '';

    const popupHtml = `
      <div style="font-family:'Space Grotesk',sans-serif;padding:6px 2px;min-width:190px">
        <div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">
          <span style="width:10px;height:10px;border-radius:50%;background:${c.color};flex-shrink:0;display:inline-block"></span>
          <span style="font-size:14px;font-weight:700;color:#0a0a0a;line-height:1.2">${c.name}</span>
        </div>
        <div style="font-size:12px;color:#666;margin-bottom:4px;line-height:1.4">${c.address}</div>
        <div style="font-size:11px;color:#999">${count > 0 ? `${count} sessões programadas` : 'Sem sessões'}</div>
        ${linkBtn}
      </div>`;

    L.marker([c.lat, c.lng], { icon })
      .addTo(leafletMap)
      .bindPopup(popupHtml, { maxWidth: 260, closeButton: false });
  }

  leafletMap.invalidateSize();
}

function renderCinemas() {
  let html = '<div id="cinema-map"></div>';

  for (const c of CINEMAS) {
    if (!cinemaOk(c.id)) continue;

    let sessions = [];
    for (const m of MOVIES) {
      for (const s of m.sessions) {
        if (s.cinema === c.id) sessions.push({ ...s, movie: m });
      }
    }
    if (sessions.length === 0) continue;
    sessions.sort((a, b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));

    html += `
      <div class="cinema-section">
        <div class="cinema-header">
          <span class="chball" style="background:${c.color}"></span>
          <span class="chname">${c.name}</span>
          <span class="chzone">${c.zone}</span>
        </div>
        <div class="sessions-list">
          ${sessions.map(s => {
            const dateObj = new Date(s.date);
            const label = `${PT_DAYS[dateObj.getDay()]} ${dateObj.getDate()} ${PT_MONTHS[dateObj.getMonth()]}`;
            return `
              <div class="session-row">
                <span class="stime">${s.time}</span>
                <div class="smovie">
                  <span class="stitle">${s.movie.title}</span>
                  <span class="smeta">${movieMeta(s.movie)}</span>
                </div>
                <div class="scinema" style="color:var(--text-3)">
                  ${label}
                </div>
              </div>`;
          }).join('')}
        </div>
      </div>`;
  }

  document.getElementById('main').innerHTML = html;
  setTimeout(initCinemaMap, 0);
}

// ── MODAL ─────────────────────────────────────────────────────────────────────

function openModal(id) {
  const m = MOVIES.find(x => String(x.id) === String(id));
  if (!m) return;

  // Poster
  const posterEl = document.getElementById('modalPoster');
  if (m.poster) {
    posterEl.innerHTML = `<img src="${m.poster}" alt="${m.title}">`;
  } else {
    posterEl.innerHTML = `<div class="modal-poster-fallback" style="background:${m.bg}"></div>`;
  }

  // Título e meta
  document.getElementById('modalTitle').textContent = m.title;
  document.getElementById('modalMeta').textContent = movieMeta(m);

  // Géneros
  const genres = (m.genres ?? []).slice(0,3);
  document.getElementById('modalGenres').innerHTML =
    genres.map(g => `<span class="genre-tag">${g}</span>`).join('');

  // Descrição
  const plotEl = document.getElementById('modalPlot');
  plotEl.textContent = m.plot ?? '';
  plotEl.style.display = m.plot ? '' : 'none';

  // Sessões
  const sessions = m.sessions
    .filter(s => s.date >= TODAY)
    .sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));

  document.getElementById('modalSessionsList').innerHTML = sessions.map(s => {
    const d = new Date(s.date + 'T00:00:00');
    const label = s.date === TODAY
      ? `Hoje`
      : `${PT_DAYS[d.getDay()]} ${d.getDate()} ${PT_MONTHS[d.getMonth()]}`;
    const c = cinema(s.cinema);
    const esc = v => JSON.stringify(String(v ?? '')).replace(/"/g, '&quot;');
    const calArgs = [esc(m.title), esc(s.date), esc(s.time), m.duration||120, esc(c.name??s.cinema), esc(c.address??'')].join(',');
    return `
      <div class="modal-session-row">
        <span class="modal-sdate">${label}</span>
        <span class="modal-stime">${s.time}</span>
        <span class="modal-scinema">
          <span class="dot" style="background:${c.color ?? '#888'}"></span>
          ${c.name ?? s.cinema}
        </span>
        <button class="modal-cal-btn" onclick="addToCalendar(${calArgs})">+ Calendário</button>
      </div>`;
  }).join('');

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function addToCalendar(title, date, time, durationMin, cinemaName, cinemaAddress) {
  const [h, m] = time.split(':').map(Number);
  const dur = durationMin || 120;
  const pad = n => String(n).padStart(2, '0');

  const startDate = new Date(date + 'T' + pad(h) + ':' + pad(m) + ':00');
  const endDate   = new Date(startDate.getTime() + dur * 60000);

  const fmt = d =>
    `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T${pad(d.getHours())}${pad(d.getMinutes())}00`;

  const uid = `cine-${date}-${time.replace(':','')}-${Math.random().toString(36).slice(2)}@cinelisboa`;
  const location = cinemaAddress ? `${cinemaName}\\, ${cinemaAddress}` : cinemaName;

  const ics = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Cine Lisboa//PT',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    'BEGIN:VEVENT',
    `UID:${uid}`,
    `DTSTART:${fmt(startDate)}`,
    `DTEND:${fmt(endDate)}`,
    `SUMMARY:${title}`,
    `LOCATION:${location}`,
    'END:VEVENT',
    'END:VCALENDAR',
  ].join('\r\n');

  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 3000);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── DISPATCH ──────────────────────────────────────────────────────────────────

function render() {
  renderDateBar();
  renderFilterBar();

  const datebar = document.getElementById('dateBar');
  datebar.style.display = activeView === 'agenda' ? 'flex' : 'none';

  if (activeView === 'agenda')  renderAgenda();
  if (activeView === 'filmes')  renderFilmes();
  if (activeView === 'cinemas') renderCinemas();

  document.querySelectorAll('nav button').forEach((btn, i) => {
    btn.classList.toggle('active', ['agenda','filmes','cinemas'][i] === activeView);
  });
}

function setView(v) {
  if (v !== 'cinemas' && leafletMap) { leafletMap.remove(); leafletMap = null; }
  activeView = v;
  render();
}
function setDate(d) {
  activeDate = d;
  if (activeView !== 'agenda') { activeView = 'agenda'; render(); }
  else render();
  requestAnimationFrame(() => {
    const el = document.querySelector(`.agenda-day[data-date="${d}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
}
function setSort(s)  { filmesSort = s; renderFilmes(); }
function toggleCinema(id) {
  activeCinemas.has(id) ? activeCinemas.delete(id) : activeCinemas.add(id);
  render();
}

render();
</script>
