<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg:     #f5f5f2;
      --surf:   #ffffff;
      --surf2:  #e8e8e5;
      --acc:    #a6cf3a;
      --ink:    #111111;
      --ink2:   #666666;
      --ink3:   #aaaaaa;
      --line:   #dedede;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Public Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--acc);
      padding: 0 48px; height: 66px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { flex: 1; }
    nav { display: flex; gap: 8px; }
    nav button {
      font-family: inherit; font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.6px;
      padding: 9px 22px; border-radius: 9999px;
      border: 2px solid var(--ink); background: none; color: var(--ink);
      cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    nav button:hover  { background: rgba(0,0,0,0.07); }
    nav button.active { background: var(--ink); color: var(--acc); }

    /* ── DATE BAR ── */
    .date-bar {
      background: var(--surf); border-bottom: 1px solid var(--line);
      width: 100%;
      display: flex;
      position: sticky;
      top: 66px;
      z-index: 99;
    }
    .date-chip {
      flex: 1;
      font-family: inherit; background: none; border: none;
      border-right: 1px solid var(--line);
      padding: 22px 0; text-align: center;
      cursor: pointer; transition: background 0.15s;
      color: var(--ink2);
    }
    .date-chip:last-child { border-right: none; }
    .date-chip:hover  { background: var(--surf2); color: var(--ink); }
    .date-chip.active { background: var(--acc);   color: var(--ink); }
    .date-chip .dn { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; opacity: 0.55; margin-bottom: 8px; }
    .date-chip .dd { display: block; font-size: 32px; font-weight: 800; line-height: 1; }
    .date-chip .dm { display: none; }

    /* ── FILTER BAR ── */
    .filter-bar {
      background: var(--surf); border-bottom: 1px solid var(--line);
      padding: 10px 48px;
      display: flex; gap: 6px; align-items: center;
      overflow-x: auto; scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
      color: var(--ink3); flex-shrink: 0;
      padding-right: 10px; border-right: 1px solid var(--line); margin-right: 2px;
    }
    .cinema-chip {
      flex-shrink: 0; font-family: inherit; font-size: 11px; font-weight: 600;
      padding: 5px 14px; border-radius: 9999px;
      border: 1.5px solid var(--line); background: none; color: var(--ink2);
      cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; gap: 6px;
    }
    .cinema-chip .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .cinema-chip:hover  { color: var(--ink); border-color: var(--ink3); }
    .cinema-chip.active { color: var(--ink); border-color: var(--ink); }

    /* ── MAIN ── */
    main { padding: 0 48px 100px; max-width: 1200px; margin: 0 auto; }

    /* ── AGENDA ── */
    .agenda-day { scroll-margin-top: 150px; }

    .day-header {
      display: flex; align-items: baseline; gap: 14px;
      padding: 28px 0 18px;
      border-bottom: 2px solid var(--ink);
    }
    .day-header .dname { font-size: 22px; font-weight: 800; letter-spacing: -0.3px; }
    .day-header .ddate { font-size: 22px; font-weight: 400; color: var(--ink2); }
    .day-header .dcount { font-size: 12px; color: var(--ink3); margin-left: auto; font-weight: 500; }

    .sessions-list { display: flex; flex-direction: column; }

    .session-row {
      display: grid;
      grid-template-columns: 90px 96px 1fr auto;
      align-items: center;
      gap: 40px;
      padding: 22px 0;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .session-row:hover { opacity: 0.5; }

    .stime {
      font-size: 38px; font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: -2px; line-height: 1;
    }
    .sthumb {
      width: 84px; height: 116px; border-radius: 5px;
      object-fit: cover; display: block; flex-shrink: 0;
      background: var(--surf2);
    }
    .smovie { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
    .stitle  { font-size: 22px; font-weight: 700; line-height: 1.2; }
    .smeta   { font-size: 13px; color: var(--ink2); }

    .scinema {
      display: inline-flex; align-items: center; gap: 7px;
      border: 1.5px solid var(--line); border-radius: 9999px;
      padding: 8px 18px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;
      color: var(--ink2); white-space: nowrap;
    }
    .scinema .cdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* ── FILMES ── */
    .films-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 0 20px; border-bottom: 2px solid var(--ink);
    }
    .films-header-title { font-size: 22px; font-weight: 800; }
    .films-sort { display: flex; gap: 6px; }
    .sort-btn {
      font-family: inherit; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
      padding: 8px 18px; border-radius: 9999px;
      border: 1.5px solid var(--line); background: none; color: var(--ink2);
      cursor: pointer; transition: all 0.15s;
    }
    .sort-btn:hover { color: var(--ink); border-color: var(--ink3); }
    .sort-btn.active { background: var(--ink); border-color: var(--ink); color: var(--acc); }

    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1px; background: var(--line);
      border: 1px solid var(--line);
      margin-top: 2px;
    }
    .movie-card { cursor: pointer; background: var(--surf); overflow: hidden; }
    .movie-card:hover .poster-bg { transform: scale(1.04); }

    .movie-poster { aspect-ratio: 2/3; overflow: hidden; position: relative; }
    .poster-bg {
      width: 100%; height: 100%;
      transition: transform 0.4s ease;
      display: flex; flex-direction: column; justify-content: flex-end; padding: 14px;
    }
    .poster-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.08) 55%, transparent 100%);
    }
    .poster-title {
      position: relative; z-index: 1;
      font-size: 13px; font-weight: 700; line-height: 1.3; color: rgba(255,255,255,0.5);
    }
    .poster-dir {
      position: relative; z-index: 1;
      font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px;
    }
    .poster-rating {
      position: absolute; top: 10px; right: 10px; z-index: 2;
      font-size: 10px; font-weight: 800;
      background: var(--acc); color: #000;
      padding: 3px 8px; border-radius: 9999px;
    }
    .movie-foot {
      padding: 12px 14px 14px;
      border-top: 1px solid var(--line);
    }
    .film-foot-title { font-size: 13px; font-weight: 700; margin-bottom: 3px; line-height: 1.3; }
    .film-foot-dir   { font-size: 11px; color: var(--ink2); margin-bottom: 8px; }
    .genres { display: flex; gap: 4px; flex-wrap: wrap; }
    .genre-tag {
      font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700;
      padding: 3px 8px; border-radius: 9999px;
      border: 1px solid var(--line); color: var(--ink3);
    }

    /* ── MODAL (dark / cinematic) ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      z-index: 500;
      display: flex; align-items: center; justify-content: center; padding: 20px;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: #0f0f0f; color: #f0f0f0;
      border-radius: 16px; width: 100%; max-width: 780px; max-height: 92vh;
      overflow-y: auto; display: flex; flex-direction: column;
      transform: translateY(22px); transition: transform 0.25s cubic-bezier(.22,1,.36,1);
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-top { display: flex; gap: 32px; padding: 32px 32px 24px; }
    .modal-poster {
      flex-shrink: 0; width: 175px; aspect-ratio: 2/3;
      border-radius: 8px; overflow: hidden; background: #1e1e1e;
    }
    .modal-poster img { width: 100%; height: 100%; object-fit: cover; }
    .modal-poster-fallback { width: 100%; height: 100%; }

    .modal-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 14px; }
    .modal-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .modal-title  { font-size: 28px; font-weight: 800; line-height: 1.15; color: #fff; letter-spacing: -0.5px; }
    .modal-close  {
      flex-shrink: 0; width: 34px; height: 34px; border-radius: 50%;
      border: none; background: #222; cursor: pointer;
      font-size: 14px; color: #777;
      display: flex; align-items: center; justify-content: center; transition: background 0.15s;
    }
    .modal-close:hover { background: #333; color: #fff; }

    .modal-meta { font-size: 13px; color: #777; }

    .modal-genres { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
    .modal-country-tag {
      font-size: 9px; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 700;
      padding: 4px 10px; border-radius: 9999px; background: #1e1e1e; color: #888;
    }
    .genre-tag {
      font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700;
      padding: 4px 10px; border-radius: 9999px; border: 1px solid #2a2a2a; color: #666;
    }
    .rating-tag {
      font-size: 10px; font-weight: 800;
      padding: 4px 10px; border-radius: 9999px;
      background: var(--acc); color: #000;
    }
    .modal-plot {
      font-size: 14px; line-height: 1.7; color: #888;
      background: #161616; padding: 14px 16px; border-radius: 8px;
    }

    .modal-sessions { border-top: 1px solid #1e1e1e; padding: 20px 32px 32px; }
    .modal-sessions-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
      color: #444; margin-bottom: 12px;
    }
    .modal-session-row {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 0; border-bottom: 1px solid #1a1a1a; font-size: 13px;
    }
    .modal-session-row:last-child { border-bottom: none; }
    .modal-sdate  { width: 120px; flex-shrink: 0; color: #555; }
    .modal-stime  { font-weight: 800; color: #fff; width: 46px; flex-shrink: 0; }
    .modal-scinema { display: flex; align-items: center; gap: 6px; color: #666; }
    .modal-scinema .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .modal-cal-btn {
      margin-left: auto; flex-shrink: 0;
      font-family: inherit; font-size: 11px; font-weight: 700;
      background: none; border: 1.5px solid #2a2a2a; border-radius: 9999px;
      padding: 5px 13px; color: #555; cursor: pointer; transition: all 0.15s;
    }
    .modal-cal-btn:hover { border-color: var(--acc); color: var(--acc); }

    /* ── CINEMAS ── */
    #cinema-map {
      width: 100%; height: 420px; border-radius: 12px; overflow: hidden;
      margin-bottom: 48px; border: 1px solid var(--line);
    }
    .leaflet-popup-content-wrapper {
      border-radius: 10px !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12) !important;
      border: 1px solid var(--line) !important;
      font-family: 'Public Sans', sans-serif !important;
    }
    .leaflet-popup-tip-container { display: none; }
    .cinema-section { margin-bottom: 56px; }
    .cinema-header {
      display: flex; align-items: center; gap: 12px;
      padding: 28px 0 18px; border-bottom: 2px solid var(--ink);
    }
    .cinema-header .chball  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .cinema-header .chname  { font-size: 22px; font-weight: 800; }
    .cinema-header .chzone  { font-size: 12px; color: var(--ink3); margin-left: auto; }

    /* ── EMPTY ── */
    .empty { padding: 120px 0; text-align: center; color: var(--ink3); font-size: 14px; }

    /* ── MOBILE ── */
    @media (max-width: 720px) {
      header { padding: 0 20px; height: 56px; }
      nav button { padding: 7px 14px; font-size: 11px; }
      .date-bar { top: 56px; }
      .filter-bar { padding: 10px 20px; }
      main { padding: 0 20px 80px; }

      .date-chip { padding: 12px 0; }
      .date-chip .dd { font-size: 20px; }
      .date-chip .dn { font-size: 9px; margin-bottom: 5px; }
      .session-row { grid-template-columns: 52px 60px 1fr; gap: 16px; }
      .scinema { display: none; }
      .stime { font-size: 24px; letter-spacing: -1px; }
      .sthumb { width: 60px; height: 84px; }
      .stitle { font-size: 16px; }
      .smeta  { font-size: 11px; }
      .day-header .dname, .day-header .ddate { font-size: 17px; }

      .movies-grid { grid-template-columns: repeat(2, 1fr); }
      .poster-rating { display: block; }

      .modal-overlay { padding: 0; align-items: flex-end; }
      .modal { border-radius: 20px 20px 0 0; max-height: 92vh; transform: translateY(100%); }
      .modal-overlay.open .modal { transform: translateY(0); }
      .modal-top { flex-direction: column; align-items: center; gap: 20px; padding: 24px 20px 16px; }
      .modal-poster { width: 140px; }
      .modal-title { font-size: 22px; }
      .modal-sessions { padding: 16px 20px 36px; }
      .modal-sdate { width: 80px; font-size: 12px; }
    }
  </style>
</head>

const TODAY = new Date().toISOString().split('T')[0];

let activeView   = 'agenda';
let activeDate   = TODAY;
let activeCinemas = new Set();
let filmesSort   = 'data'; // 'data' | 'rating'

// ── HELPERS ───────────────────────────────────────────────────────────────────

const PT_DAYS   = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const PT_MONTHS = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

function getDates() {
  const start = new Date(TODAY + 'T00:00:00');
  return Array.from({length: 12}, (_, i) => {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    return {
      value:  `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`,
      name:   PT_DAYS[d.getDay()],
      num:    d.getDate(),
      month:  PT_MONTHS[d.getMonth()],
      today:  i === 0
    };
  });
}

function cinema(id) { return CINEMAS.find(c => c.id === id) || {}; }

function movieMeta(m) {
  const parts = [];
  if (m.director) parts.push(m.director);
  if (m.year)     parts.push(m.year);
  if (m.duration) parts.push(m.duration + 'min');
  return parts.join(' · ') || '—';
}

function cinemaOk(cid) {
  return activeCinemas.size === 0 || activeCinemas.has(cid);
}

function sessionCount(movie) {
  return movie.sessions.filter(s => cinemaOk(s.cinema)).length;
}

// ── RENDER AGENDA ─────────────────────────────────────────────────────────────

function renderAgenda() {
  let html = '';

  for (const d of getDates()) {
    let sessions = [];
    for (const m of MOVIES) {
      for (const s of m.sessions) {
        if (s.date === d.value && cinemaOk(s.cinema))
          sessions.push({ ...s, movie: m });
      }
    }
    if (sessions.length === 0) continue;
    sessions.sort((a, b) => a.time.localeCompare(b.time));

    html += `
      <div class="agenda-day" data-date="${d.value}">
        <div class="day-header">
          <span class="dname">${d.today ? 'Hoje' : d.name}</span>
          <span class="ddate">${d.num} ${d.month}</span>
          <span class="dcount">${sessions.length} ${sessions.length === 1 ? 'sessão' : 'sessões'}</span>
        </div>
        <div class="sessions-list">
          ${sessions.map(s => {
            const c = cinema(s.cinema);
            const thumb = s.movie.poster
              ? `<img class="sthumb" src="${s.movie.poster}" alt="" loading="lazy">`
              : `<div class="sthumb" style="background:${s.movie.bg}"></div>`;
            return `
              <div class="session-row" onclick="openModal('${s.movie.id}')">
                <span class="stime">${s.time}</span>
                ${thumb}
                <div class="smovie">
                  <span class="stitle">${s.movie.title}</span>
                  <span class="smeta">${s.movie.director ?? ''}${s.movie.year ? ' · ' + s.movie.year : ''}${s.movie.duration ? ' · ' + s.movie.duration + 'min' : ''}</span>
                </div>
                <div class="scinema">
                  <span class="cdot" style="background:${c.color}"></span>
                  ${c.short}
                </div>
              </div>`;
          }).join('')}
        </div>
      </div>`;
  }

  document.getElementById('main').innerHTML = html || '<div class="empty">Sem sessões disponíveis.</div>';
}

// ── RENDER FILMES ─────────────────────────────────────────────────────────────

function nextSession(movie) {
  // Data+hora da próxima sessão futura
  const now = TODAY;
  const future = movie.sessions
    .filter(s => cinemaOk(s.cinema) && s.date >= now)
    .sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));
  return future[0] ?? null;
}

function renderFilmes() {
  let movies = MOVIES.filter(m => sessionCount(m) > 0);

  if (filmesSort === 'rating') {
    movies = [...movies].sort((a, b) => (b.rating ?? 0) - (a.rating ?? 0));
  } else {
    // Ordena pela próxima sessão mais próxima
    movies = [...movies].sort((a, b) => {
      const sa = nextSession(a), sb = nextSession(b);
      if (!sa && !sb) return 0;
      if (!sa) return 1;
      if (!sb) return -1;
      return (sa.date + sa.time).localeCompare(sb.date + sb.time);
    });
  }

  document.getElementById('main').style.padding = '';
  document.getElementById('main').innerHTML = `
    <div class="films-header">
      <span class="films-header-title">Em exibição</span>
      <div class="films-sort">
        <button class="sort-btn ${filmesSort === 'data'   ? 'active' : ''}" onclick="setSort('data')">Próxima sessão</button>
        <button class="sort-btn ${filmesSort === 'rating' ? 'active' : ''}" onclick="setSort('rating')">★ Rating</button>
      </div>
    </div>
    <div class="movies-grid">
      ${movies.map(m => `
        <div class="movie-card" onclick="openModal('${m.id}')">
          <div class="movie-poster">
            <div class="poster-bg" style="${m.poster
              ? `background:url('${m.poster}') center/cover no-repeat`
              : `background:${m.bg}`}">
              ${m.poster ? '' : '<div class="poster-overlay"></div><span class="poster-title">${m.title}</span>'}
            </div>
            ${m.rating ? `<span class="poster-rating">★ ${m.rating.toFixed(1)}</span>` : ''}
          </div>
          <div class="movie-foot">
            <div class="film-foot-title">${m.title}</div>
            ${m.director ? `<div class="film-foot-dir">${m.director}</div>` : ''}
            <div class="genres">
              ${(m.genres ?? []).slice(0,2).map(g => `<span class="genre-tag">${g}</span>`).join('')}
            </div>
          </div>
        </div>`).join('')}
    </div>`;
}

    zoomControl: true,
    scrollWheelZoom: false,

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {

    subdomains: 'abcd',
    maxZoom: 19,

  // Count total sessions per cinema

      iconSize: [16, 16],
      iconAnchor: [8, 8],
      popupAnchor: [0, -12],
    });

    const linkBtn = c.url
      ? `<a href="${c.url}" target="_blank" rel="noopener"
            style="display:inline-block;margin-top:8px;padding:5px 12px;border-radius:5px;background:${c.color};color:#fff;font-size:11px;font-weight:700;text-decoration:none;letter-spacing:0.3px">
           Abrir site ↗
         </a>`
      : '';

    const popupHtml = `
      <div style="font-family:'Space Grotesk',sans-serif;padding:6px 2px;min-width:190px">
        <div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">
          <span style="width:10px;height:10px;border-radius:50%;background:${c.color};flex-shrink:0;display:inline-block"></span>
          <span style="font-size:14px;font-weight:700;color:#0a0a0a;line-height:1.2">${c.name}</span>

        <div style="font-size:12px;color:#666;margin-bottom:4px;line-height:1.4">${c.address}</div>

    L.marker([c.lat, c.lng], { icon })
      .addTo(leafletMap)

  leafletMap.invalidateSize();

function openModal(id) {
  const m = MOVIES.find(x => String(x.id) === String(id));
  if (!m) return;

  // Poster
  const posterEl = document.getElementById('modalPoster');
  if (m.poster) {
    posterEl.innerHTML = `<img src="${m.poster}" alt="${m.title}">`;
  } else {
    posterEl.innerHTML = `<div class="modal-poster-fallback" style="background:${m.bg}"></div>`;
  }

  // Título e meta
  document.getElementById('modalTitle').textContent = m.title;
  document.getElementById('modalMeta').textContent = movieMeta(m);

  // País + Géneros + Rating (badges em linha)
  const country = m.country ? m.country.split(',')[0].trim() : null;
  const genres  = (m.genres ?? []).slice(0, 3);
  document.getElementById('modalGenres').innerHTML =
    (country ? `<span class="modal-country-tag">${country}</span>` : '') +
    genres.map(g => `<span class="genre-tag">${g}</span>`).join('') +
    (m.rating ? `<span class="rating-tag">★ ${m.rating.toFixed(1)}</span>` : '');

  // Descrição
  const plotEl = document.getElementById('modalPlot');
  plotEl.textContent = m.plot ?? '';
  plotEl.style.display = m.plot ? '' : 'none';

  // Sessões
  const sessions = m.sessions
    .filter(s => s.date >= TODAY)
    .sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));

  document.getElementById('modalSessionsList').innerHTML = sessions.map(s => {
    const d = new Date(s.date + 'T00:00:00');
    const label = s.date === TODAY
      ? `Hoje`
      : `${PT_DAYS[d.getDay()]} ${d.getDate()} ${PT_MONTHS[d.getMonth()]}`;
    const c = cinema(s.cinema);
    const esc = v => JSON.stringify(String(v ?? '')).replace(/"/g, '&quot;');
    const calArgs = [esc(m.title), esc(s.date), esc(s.time), m.duration||120, esc(c.name??s.cinema), esc(c.address??'')].join(',');
    return `
      <div class="modal-session-row">
        <span class="modal-sdate">${label}</span>
        <span class="modal-stime">${s.time}</span>
        <span class="modal-scinema">
          <span class="dot" style="background:${c.color ?? '#888'}"></span>
          ${c.name ?? s.cinema}
        </span>
        <button class="modal-cal-btn" onclick="addToCalendar(${calArgs})">+ Calendário</button>
      </div>`;
  }).join('');

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function addToCalendar(title, date, time, durationMin, cinemaName, cinemaAddress) {
  const [h, m] = time.split(':').map(Number);
  const dur = durationMin || 120;
  const pad = n => String(n).padStart(2, '0');

  const startDate = new Date(date + 'T' + pad(h) + ':' + pad(m) + ':00');
  const endDate   = new Date(startDate.getTime() + dur * 60000);

  const fmt = d =>
    `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T${pad(d.getHours())}${pad(d.getMinutes())}00`;

  const uid = `${date}-${time.replace(':','')}-${Math.random().toString(36).slice(2)}`;
  const location = cinemaAddress ? `${cinemaName}\\, ${cinemaAddress}` : cinemaName;

  const ics = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//cinemas//PT',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    'BEGIN:VEVENT',
    `UID:${uid}`,
    `DTSTART:${fmt(startDate)}`,
    `DTEND:${fmt(endDate)}`,
    `SUMMARY:${title}`,
    `LOCATION:${location}`,
    'END:VEVENT',
    'END:VCALENDAR',
  ].join('\r\n');

  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 3000);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  document.getElementById('main').style.padding = '';

  const datebar = document.getElementById('dateBar');
  datebar.style.display = activeView === 'agenda' ? 'flex' : 'none';

  if (activeView === 'agenda')  renderAgenda();
  if (activeView === 'filmes')  renderFilmes();
  if (activeView === 'cinemas') renderCinemas();

  document.querySelectorAll('nav button').forEach((btn, i) => {
    btn.classList.toggle('active', ['agenda','filmes','cinemas'][i] === activeView);
  });
}

function setView(v) {
  if (v !== 'cinemas' && leafletMap) { leafletMap.remove(); leafletMap = null; }
  activeView = v;
  render();
}
function setDate(d) {
  activeDate = d;
  if (activeView !== 'agenda') { activeView = 'agenda'; render(); }
  else render();
  requestAnimationFrame(() => {
    const el = document.querySelector(`.agenda-day[data-date="${d}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
}
function setSort(s)  { filmesSort = s; renderFilmes(); }
function toggleCinema(id) {
  activeCinemas.has(id) ? activeCinemas.delete(id) : activeCinemas.add(id);
  render();
}

render();
</script>
</body>
</html>
